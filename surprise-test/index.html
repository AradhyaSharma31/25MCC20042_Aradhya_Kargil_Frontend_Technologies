<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart To-Do Manager</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand mb-0 h1">Smart To-Do Manager</span>
  </div>
</nav>

<div class="container mt-4">

  <form id="task-form" class="card p-3 shadow-sm">
    <div class="row g-3">
      
      <div class="col-md-4">
        <input type="text" id="task-title" class="form-control" placeholder="Task name">
      </div>

      <div class="col-md-3">
        <select id="task-priority" class="form-select">
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
      </div>

      <div class="col-md-3">
        <input type="date" id="task-deadline" class="form-control">
      </div>

      <div class="col-md-2">
        <button class="btn btn-primary w-100">Add</button>
      </div>

    </div>
  </form>

  <div class="d-flex justify-content-between align-items-center mt-4">
    
    <select id="filter" class="form-select w-25">
      <option value="all">All</option>
      <option value="completed">Completed</option>
      <option value="pending">Pending</option>
    </select>

    <select id="sort" class="form-select w-25">
      <option value="">Sort By</option>
      <option value="priority">Priority</option>
      <option value="deadline">Deadline</option>
    </select>

  </div>

  <div class="mt-3">
    <span class="badge bg-primary">Total: <span id="total-count">0</span></span>
    <span class="badge bg-success">Completed: <span id="completed-count">0</span></span>
    <span class="badge bg-warning text-dark">Pending: <span id="pending-count">0</span></span>
  </div>

  <ul id="task-container" class="list-group mt-3"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
